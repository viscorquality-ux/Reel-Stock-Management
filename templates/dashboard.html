{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card text-white bg-success mb-3 shadow">
            <div class="card-header">Active Stock Registry</div>
            <div class="card-body">
                <h1 class="card-title">{{ active_count }} Reels Available</h1>
                <a href="/active_stock" class="btn btn-light mt-2">Manage Active Stock ➔</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card text-dark bg-warning mb-3 shadow">
            <div class="card-header">Issued & Processing</div>
            <div class="card-body">
                <h1 class="card-title">{{ issued_count }} Reels Issued</h1>
                <a href="/issued_stock" class="btn btn-dark mt-2">Process Returns ➔</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
