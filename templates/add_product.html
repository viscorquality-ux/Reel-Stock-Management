<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product - Packwell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 12px; border: none; }
        .card-header { border-radius: 12px 12px 0 0 !important; background: linear-gradient(135deg, #0d6efd, #0b5ed7); }
        .form-control, .form-select { border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-box-seam"></i> Packwell Stock System</span>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        <strong>{{ message }}</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <div class="card shadow-lg mb-5">
                    <div class="card-header text-white p-3">
                        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Register New Product</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" action="/add_product">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Customer ID</label>
                                    <input type="text" class="form-control" name="customer_id" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Customer Name</label>
                                    <input type="text" class="form-control" name="customer_name" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-muted fw-bold">Customer Address</label>
                                    <input type="text" class="form-control" name="address">
                                </div>
                                <hr class="mt-4 mb-2 text-muted">
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Product Code</label>
                                    <input type="text" class="form-control" name="product_code" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Product Name</label>
                                    <input type="text" class="form-control" name="product_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Cartoon Size (L*W*H)</label>
                                    <input type="text" class="form-control" name="cartoon_size" placeholder="e.g. 100*50*20" required>
                                    <small class="text-danger">Order: Length * Width * Height</small>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Position</label>
                                    <select class="form-select" name="position" required>
                                        <option value="Internal">Internal</option>
                                        <option value="External">External</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Flute Type</label>
                                    <select class="form-select" name="flute" required>
                                        <option value="B">B Flute</option>
                                        <option value="C">C Flute</option>
                                        <option value="E">E Flute</option>
                                        <option value="BC">BC Flute</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted fw-bold">Ply</label>
                                    <select class="form-select" name="ply" required>
                                        <option value="3">3 Ply</option>
                                        <option value="5">5 Ply</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mt-4 text-end">
                                <button type="reset" class="btn btn-secondary me-2">Clear</button>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Save Product</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
