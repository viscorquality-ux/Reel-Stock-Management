<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product - Packwell</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 12px; border: none; }
        .card-header { border-radius: 12px 12px 0 0 !important; background: linear-gradient(135deg, #0d6efd, #0b5ed7); }
        .form-control, .form-select { border-radius: 8px; }
        .table-scroll-container { max-height: 500px; overflow-y: auto; }
        #masterProductsTable thead th { position: sticky; top: 0; z-index: 1; background-color: #212529; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-box-seam me-2"></i>Packwell Product Registry</span>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-xl-4 col-lg-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header text-white py-3">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-plus-circle me-2"></i>Register New Product</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="addProductForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Customer ID</label>
                                <input type="text" id="customer_id" class="form-control" required placeholder="e.g. CUST001">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Customer Name</label>
                                <input type="text" id="customer_name" class="form-control" required placeholder="Company Name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Code (Code No)</label>
                                <input type="text" id="product_code" class="form-control" required placeholder="e.g. PRD-992">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Product Name</label>
                                <input type="text" id="product_name" class="form-control" required placeholder="Box Type Description">
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-6">
                                    <label class="form-label fw-semibold">Carton Size</label>
                                    <input type="text" id="cartoon_size" class="form-control" placeholder="LxWxH cm">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-semibold">Position</label>
                                    <input type="text" id="position" class="form-control" placeholder="Top/Bottom">
                                </div>
                            </div>
                            <div class="row g-2 mb-4">
                                <div class="col-6">
                                    <label class="form-label fw-semibold">Flute Type</label>
                                    <input type="text" id="flute" class="form-control" placeholder="B, C, E, BC">
                                clip_text</div>
                                <div class="col-6">
                                    <label class="form-label fw-semibold">Ply Count</label>
                                    <select id="ply" class="form-select">
                                        <option value="2">2 Ply</option>
                                        <option value="3" selected>3 Ply</option>
                                        <option value="5">5 Ply</option>
                                        <option value="7">7 Ply</option>
                                    </select>
                                </div>
                            </div>
                            <button type="button" onclick="submitProductForm()" class="btn btn-primary w-100 py-2 fw-bold"><i class="bi bi-save me-2"></i>Save Master Product</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-xl-8 col-lg-7">
                <div class="card shadow-sm p-4 bg-white">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-3">
                        <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-folder2-open me-2"></i>Customer Products Base Registry</h5>
                        
                        <div class="search-box position-relative style-container" style="min-width: 350px;">
                            <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted"><i class="bi bi-search"></i></span>
                            <input type="text" id="productMultiSearch" class="form-control ps-5 py-2 border-primary" placeholder="සෙවීමට Customer Id සහ Product Code එක දිගටම ටයිප් කරන්න..." onkeyup="executeMultiSearch()">
                        </div>
                    </div>

                    <div class="table-scroll-container border rounded">
                        <table class="table table-hover table-striped mb-0 text-center align-middle" id="masterProductsTable">
                            <thead class="table-dark">
                                <tr>
                                    <th>Customer ID</th>
                                    <th>Customer Name</th>
                                    <th>Product Code</th>
                                    <th>Product Name</th>
                                    <th>Size & Build</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="productRegistryBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editProductModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark fw-bold">
                    <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Registry Product Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit_id">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Customer ID</label>
                        <input type="text" id="edit_customer_id" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Customer Name</label>
                        <input type="text" id="edit_customer_name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Product Code</label>
                        <input type="text" id="edit_product_code" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Product Name</label>
                        <input type="text" id="edit_product_name" class="form-control">
                    </div>
                    <div class="row g-2">
                        <div class="col-4"><label class="form-label">Size</label><input type="text" id="edit_cartoon_size" class="form-control"></div>
                        <div class="col-4"><label class="form-label">Flute</label><input type="text" id="edit_flute" class="form-control"></div>
                        <div class="col-4"><label class="form-label">Ply</label><input type="number" id="edit_ply" class="form-control"></div>
                    </div>
                    <input type="hidden" id="edit_position">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" onclick="saveEditedProduct()" class="btn btn-warning fw-bold">Save Registry Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadProducts() {
            fetch('/api/get_products')
                .then(r => r.json())
                .then(data => {
                    const tbody = document.getElementById('productRegistryBody');
                    tbody.innerHTML = '';
                    data.forEach(p => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="fw-bold text-primary">${p.customer_id}</td>
                                <td class="text-start">${p.customer_name}</td>
                                <td class="font-monospace text-dark fw-bold">${p.product_code}</td>
                                <td class="text-start">${p.product_name}</td>
                                <td><span class="badge bg-light text-dark border">${p.cartoon_size || ''} | ${p.flute || ''} Flute | ${p.ply}Ply</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-warning" onclick="openEditModal(${JSON.stringify(p).background})"><i class="bi bi-pencil-fill"></i></button>
                                </td>
                            </tr>
                        `;
                    });
                });
        }

        // Multi-Search Filter Logic (Customer ID & Product Code එක දිගට සෙවීම සඳහා)
        function executeMultiSearch() {
            const query = document.getElementById('productMultiSearch').value.toLowerCase().trim();
            const searchTerms = query.split(' ').filter(term => term !== ''); // හිස්තැන් අනුව වෙන් කිරීම
            const rows = document.querySelectorAll('#productRegistryBody tr');

            rows.forEach(row => {
                const rowText = row.innerText.toLowerCase();
                // සෑම පදයක්ම අදාළ පේළියේ තිබේදැයි පරික්ෂා කිරීම (Multi search verification)
                const matchAll = searchTerms.every(term => rowText.includes(term));
                row.style.display = matchAll ? '' : 'none';
            });
        }

        function submitProductForm() {
            const payload = {
                customer_id: document.getElementById('customer_id').value,
                customer_name: document.getElementById('customer_name').value,
                product_code: document.getElementById('product_code').value,
                product_name: document.getElementById('product_name').value,
                cartoon_size: document.getElementById('cartoon_size').value,
                position: document.getElementById('position').value,
                flute: document.getElementById('flute').value,
                ply: document.getElementById('ply').value
            };

            fetch('/api/add_product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(res => {
                if(res.success) {
                    alert('නිෂ්පාදනය සාර්ථකව පද්ධතියට එක් කරන ලදී!');
                    document.getElementById('addProductForm').reset();
                    loadProducts();
                } else {
                    alert(res.message); // Duplicate පණිවිඩය මෙහිදී දර්ශනය වේ.
                }
            });
        }

        function openEditModal(p) {
            document.getElementById('edit_id').value = p.id;
            document.getElementById('edit_customer_id').value = p.customer_id;
            document.getElementById('edit_customer_name').value = p.customer_name;
            document.getElementById('edit_product_code').value = p.product_code;
            document.getElementById('edit_product_name').value = p.product_name;
            document.getElementById('edit_cartoon_size').value = p.cartoon_size;
            document.getElementById('edit_flute').value = p.flute;
            document.getElementById('edit_ply').value = p.ply;
            document.getElementById('edit_position').value = p.position || '';
            new bootstrap.Modal(document.getElementById('editProductModal')).show();
        }

        function saveEditedProduct() {
            const payload = {
                id: document.getElementById('edit_id').value,
                customer_id: document.getElementById('edit_customer_id').value,
                customer_name: document.getElementById('edit_customer_name').value,
                product_code: document.getElementById('edit_product_code').value,
                product_name: document.getElementById('edit_product_name').value,
                cartoon_size: document.getElementById('edit_cartoon_size').value,
                position: document.getElementById('edit_position').value,
                flute: document.getElementById('edit_flute').value,
                ply: document.getElementById('edit_ply').value
            };

            fetch('/api/update_product', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(r => r.json()).then(res => {
                if(res.success) {
                    alert('නිෂ්පාදන විස්තර සාර්ථකව යාවත්කාලීන කරන ලදී!');
                    bootstrap.Modal.getInstance(document.getElementById('editProductModal')).hide();
                    loadProducts(); 
                } else {
                    alert(res.message); // Edit කිරීමේදී Duplicate හමු වුවහොත් මෙහිදී වලක්වයි.
                }
            });
        }

        document.addEventListener("DOMContentLoaded", loadProducts);
    </script>
</body>
</html>
