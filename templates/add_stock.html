{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-dark text-white text-center"><h4><i class="bi bi-box-seam"></i> Add New Stock Item</h4></div>
            <div class="card-body bg-light p-4">
                <form action="/add_stock" method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Reel ID (Unique)</label>
                            <input type="text" name="reel_no" class="form-control border-secondary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Paper Name</label>
                            <select name="paper_name" class="form-select border-secondary" required>
                                <option value="liner(T)">liner(T)</option>
                                <option value="medium(C)">medium(C)</option>
                                <option value="kraft(K)">kraft(K)</option>
                                <option value="White(WT)">White(WT)</option>
                                <option value="white kraft(WK)">white kraft(WK)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Size (cm)</label>
                            <input type="number" step="0.01" name="size" class="form-control border-secondary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">GSM</label>
                            <input type="number" name="gsm" class="form-control border-secondary" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Type / Grade</label>
                            <input type="text" name="type" class="form-control border-secondary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Weight (kg)</label>
                            <input type="number" step="0.01" name="weight" class="form-control border-secondary" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Supplier Name</label>
                            <input type="text" name="supplier" class="form-control border-secondary" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Initial Gate Pass No</label>
                            {% if session['role'] == 'Data Operator 2' %}
                            <input type="text" name="gate_pass" class="form-control bg-white text-muted" value="LOCKED-OP2" readonly>
                            {% else %}
                            <input type="text" name="gate_pass" class="form-control border-secondary" required>
                            {% endif %}
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Store Location</label>
                            <select name="store_location" class="form-select border-secondary">
                                {% for loc in locations %}
                                <option value="{{ loc }}">{{ loc }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Reel Condition</label>
                            <div class="d-flex gap-3 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="reel_condition" value="Full" id="rFull" checked>
                                    <label class="form-check-label fw-bold text-success" for="rFull">Full Reel</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="reel_condition" value="Used" id="rUsed">
                                    <label class="form-check-label fw-bold text-warning" for="rUsed">Used Reel</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold fs-5 shadow-sm">Save to Database & Generate QR</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
