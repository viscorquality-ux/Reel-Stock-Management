{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Add New Raw Material Stock Entry</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('add_stock') }}" method="POST">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Reel Number *</label>
                        <input type="text" class="form-control" name="reel_number" required placeholder="e.g. R-10254">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Paper Name / Material Description *</label>
                        <input type="text" class="form-control" name="paper_name" required placeholder="e.g. Kraft Paper 125gsm">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Size (cm) *</label>
                        <input type="number" step="0.01" class="form-control" name="size_cm" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Weight (kg) *</label>
                        <input type="number" step="0.01" class="form-control" name="weight" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">GSM *</label>
                        <input type="number" class="form-control" name="gsm" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Store Location *</label>
                        <select class="form-select" name="store_location" required>
                            <option value="" disabled selected>Select Location...</option>
                            <option value="Viscor Lanka">Viscor Lanka</option>
                            <option value="Packwell 1">Packwell 1</option>
                            <option value="Packwell 2">Packwell 2</option>
                            <option value="Packwell 3">Packwell 3</option>
                            <option value="Packwell 4">Packwell 4</option>
                            <option value="Packwell 5">Packwell 5</option>
                            <option value="Packwell 6">Packwell 6</option>
                            <option value="Packwell 7">Packwell 7</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Reel Quality Type *</label>
                        <select class="form-select" name="type" required>
                            <option value="" disabled selected>Select Quality Type...</option>
                            <option value="Liner (T)">Liner (T)</option>
                            <option value="Medium(C)">Medium(C)</option>
                            <option value="Kraft(K)">Kraft(K)</option>
                            <option value="White(WT)">White(WT)</option>
                            <option value="White Kraft(WK)">White Kraft(WK)</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Gate Pass Number (Optional)</label>
                        <input type="text" class="form-control" name="gate_pass_number" placeholder="-">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Supplier Name (Optional)</label>
                        <input type="text" class="form-control" name="supplier" placeholder="e.g. ABC Papers Ltd">
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 fw-bold">Save Stock Entry</button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
