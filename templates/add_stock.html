{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Add New Stock Reel</h2>
</div>

<div class="card p-4 shadow-sm border-0 bg-white">
    <form action="/add_stock" method="POST">
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Reel Number</label>
                <input type="text" name="reel_number" class="form-control" placeholder="Enter Reel Number" required>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Paper Name</label>
                <input type="text" name="paper_name" class="form-control" placeholder="Ex: Kraft Paper" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold">Size (cm)</label>
                <input type="number" step="0.01" name="size_cm" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Weight (kg)</label>
                <input type="number" step="0.01" name="weight_kg" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">GSM</label>
                <input type="number" name="gsm" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Reel Type</label>
                <input type="text" name="reel_type" class="form-control" value="Standard" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-4">
                <label class="form-label fw-bold">Status</label>
                <select name="status" class="form-select">
                    <option value="Full Reel">Full Reel</option>
                    <option value="Used Reel">Used Reel (Partial)</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Gate Pass Number</label>
                <input type="text" name="gate_pass_number" class="form-control" placeholder="Optional">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Supplier</label>
                <input type="text" name="supplier" class="form-control" placeholder="Optional">
            </div>
        </div>

        {% if user_role not in ['dataop1', 'super1'] %}
        <div class="mb-4">
            <label class="form-label fw-bold">Routing Type</label>
            <select name="routing_type" class="form-select">
                <option value="Standard">Standard / Main</option>
                <option value="Viscor Lanka Line">Viscor Lanka Line</option>
            </select>
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary w-100 fw-bold py-2"><i class="bi bi-save"></i> Save New Reel</button>
    </form>
</div>
{% endblock %}
