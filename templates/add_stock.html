{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Add New Raw Material Stock Entry</h4>
        </div>
        <div class="card-body">
            <form action="{{ url_for('add_stock') }}" method="POST">
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Reel Number *</label>
                        <input type="text" class="form-control" name="reel_number" required placeholder="e.g. R-10254">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Paper Name / Material *</label>
                        <input type="text" class="form-control" name="paper_name" required placeholder="e.g. Kraft Paper">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Size (cm) *</label>
                        <input type="number" step="0.01" class="form-control" name="size_cm" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Weight (kg) *</label>
                        <input type="number" step="0.01" class="form-control" name="weight_kg" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">GSM</label>
                        <input type="number" class="form-control" name="gsm">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-primary">Reel Quality Type *</label>
                        <!-- 🛠️ FIXED: Added the specific drop-down items requested -->
                        <select class="form-select" name="reel_type" required>
                            <option value="Liner(T)">Liner(T)</option>
                            <option value="Medium(C)">Medium(C)</option>
                            <option value="Kraft(K)">Kraft(K)</option>
                            <option value="White(WT)">White(WT)</option>
                            <option value="White Kraft(WK)">White Kraft(WK)</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-success">Initial Status *</label>
                        <div class="mt-2 border p-2 rounded bg-light">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status" id="statusFull" value="Full Reel" checked>
                                <label class="form-check-label text-success fw-bold" for="statusFull">Full Reel</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="status" id="statusUsed" value="Used Reel">
                                <label class="form-check-label text-warning fw-bold" for="statusUsed">Used Reel</label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-info">Warehouse Location *</label>
                        <select class="form-select" name="store_location" required>
                            {% for loc in locations %}
                                <option value="{{ loc }}">{{ loc }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Gate Pass Number (Optional)</label>
                        <input type="text" class="form-control" name="gate_pass_number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Supplier Name (Optional)</label>
                        <input type="text" class="form-control" name="supplier" placeholder="e.g. Supplier Pvt Ltd">
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5 fw-bold">Save Stock Entry</button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
