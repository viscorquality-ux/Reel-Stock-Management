{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm border-0 max-width-700 mx-auto">
        <div class="card-header bg-dark text-white fw-bold py-3">
            <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Raw Material Stock Entry</h4>
        </div>
        <div class="card-body p-4">
            <!-- app.py වෙතින් එන user_role අගය JavaScript වලට ලබා ගැනීමට මෙතන නිවැරදි කර ඇත -->
            <input type="hidden" id="currentUserRole" value="{{ user_role }}">

            <form action="{{ url_for('add_stock') }}" method="POST" id="rawMaterialForm">
                
                <!-- Material Type -->
                <div class="mb-3">
                    <label for="paper_name" class="form-label fw-bold">Material / Paper Name</label>
                    <select class="form-select" id="paper_name" name="paper_name" required>
                        <option value="" selected disabled>Select Material...</option>
                        <option value="Box Board">Box Board</option>
                        <option value="Kraft Paper">Kraft Paper</option>
                        <option value="Art Board">Art Board</option>
                        <option value="Duplex Board">Duplex Board</option>
                    </select>
                </div>

                <div class="row">
                    <!-- Size -->
                    <div class="col-md-6 mb-3">
                        <label for="size_cm" class="form-label fw-bold">Size (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="size_cm" name="size_cm" placeholder="e.g., 100" required>
                    </div>
                    <!-- GSM -->
                    <div class="col-md-6 mb-3">
                        <label for="gsm" class="form-label fw-bold">GSM</label>
                        <input type="number" class="form-control" id="gsm" name="gsm" placeholder="e.g., 140" required>
                    </div>
                </div>

                <div class="row">
                    <!-- Weight -->
                    <div class="col-md-6 mb-3">
                        <label for="weight_kg" class="form-label fw-bold">Weight (kg)</label>
                        <input type="number" step="0.01" class="form-control" id="weight_kg" name="weight_kg" placeholder="e.g., 450.50" required>
                    </div>
                    <!-- Reel Number -->
                    <div class="col-md-6 mb-3">
                        <label for="reel_number" class="form-label fw-bold">Reel Number</label>
                        <input type="text" class="form-control" id="reel_number" name="reel_number" placeholder="e.g., REEL-9901" required>
                    </div>
                </div>

                <!-- Warehouse Location (user_role එක අනුව Block වන කොටස) -->
                <div class="mb-4">
                    <label for="store_location" class="form-label fw-bold">Warehouse Location</label>
                    <select class="form-select" id="store_location" name="store_location" required>
                        <option value="" selected disabled>Select Warehouse Location...</option>
                        
                        <!-- user_role එක dataop1 නම් Packwell 1-7 Block වේ -->
                        <option value="Packwell 1-7" {% if user_role == 'dataop1' %} disabled class="text-muted bg-light" {% endif %}>
                            Packwell 1-7 {% if user_role == 'dataop1' %} (Blocked for DataOp 1) {% endif %}
                        </option>
                        
                        <!-- user_role එක dataop2 නම් Viscor Lanka Block වේ -->
                        <option value="Viscor Lanka" {% if user_role == 'dataop2' %} disabled class="text-muted bg-light" {% endif %}>
                            Viscor Lanka {% if user_role == 'dataop2' %} (Blocked for DataOp 2) {% endif %}
                        </option>

                        <!-- අනෙකුත් Locations -->
                        <option value="Main Store">Main Store</option>
                        <option value="Yard 02">Yard 02</option>
                    </select>
                    <div id="locationWarning" class="form-text text-danger fw-bold mt-1" style="display: none;"></div>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-dark btn-lg fw-bold"><i class="bi bi-plus-circle"></i> Save Stock Entry</button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- Dynamic Restriction JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    let userRole = document.getElementById('currentUserRole').value.toLowerCase().trim();
    let locationSelect = document.getElementById('store_location');
    let warningDiv = document.getElementById('locationWarning');

    locationSelect.addEventListener('change', function() {
        let selectedValue = this.value;
        
        if (userRole === 'dataop1' && selectedValue === 'Packwell 1-7') {
            warningDiv.innerText = "❌ You are not authorized to select Packwell 1-7 Location.";
            warningDiv.style.display = 'block';
            this.value = ""; 
        } 
        else if (userRole === 'dataop2' && selectedValue === 'Viscor Lanka') {
            warningDiv.innerText = "❌ You are not authorized to select Viscor Lanka Location.";
            warningDiv.style.display = 'block';
            this.value = ""; 
        } 
        else {
            warningDiv.style.display = 'none';
        }
    });
});
</script>

{% endblock %}
