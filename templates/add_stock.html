{% extends 'base.html' %}
{% block content %}
<div class="card col-md-8 mx-auto shadow-sm">
    <div class="card-header bg-primary text-white fw-bold">Add New Reel Stock Form</div>
    <div class="card-body">
        <form action="/add_stock" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Stock Target Destination:</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="status" id="full" value="Full Reel" checked>
                    <label class="form-check-label" for="full">1 - Move to Full Reel Tab</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="status" id="used" value="Used Reel">
                    <label class="form-check-label" for="used">2 - Move to Used Reel Tab</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Reel Code Number:</label>
                <input type="text" name="reel_number" class="form-control" required placeholder="Enter Reel Barcode/ID">
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Size (Measurement Unit: <strong>cm</strong>):</label>
                    <input type="number" step="0.01" name="size_cm" class="form-control" required placeholder="Size in cm">
                </div>
                <div class="col">
                    <label class="form-label">Weight (kg):</label>
                    <input type="number" step="0.01" name="weight_kg" class="form-control" required placeholder="Weight in kg">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Paper Name Type Selection:</label>
                <select name="paper_name" class="form-select" required>
                    <option value="" disabled selected>Choose paper type option...</option>
                    <option value="liner(T)">1 - liner(T)</option>
                    <option value="medium(C)">2 - medium(C)</option>
                    <option value="kraft(K)">3 - kraft(K)</option>
                    <option value="White(WT)">4 - White(WT)</option>
                    <option value="white kraft(WK)">5 - white kraft(WK)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Gate Pass Number Reference:</label>
                <input type="text" name="gate_pass_number" class="form-control" required placeholder="Enter Verified Gate Pass No">
            </div>

            <div class="mb-3 form-check">
                {% if user_role == 'dataop1' %}
                    <input type="checkbox" class="form-check-input" id="routingCheck" checked disabled>
                    <input type="hidden" name="routing_type" value="Viscor Lanka Line">
                    <label class="form-check-label fw-bold text-danger" for="routingCheck">Routing Type: Viscor Lanka Line (Locked for dataop1)</label>
                {% else %}
                    <input type="checkbox" class="form-check-input" id="routingCheck" name="routing_type" value="Viscor Lanka Line">
                    <label class="form-check-label" for="routingCheck">Routing Type: Viscor Lanka Line</label>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold">Submit and Save New Stock</button>
        </form>
    </div>
</div>
{% endblock %}
