{% extends "base.html" %}
{% block content %}
<div class="row mb-4">
    <div class="col-md-12">
        <div class="card shadow border-warning">
            <div class="card-header bg-warning text-dark"><b>Return Reel Processing</b></div>
            <div class="card-body">
                <form action="/process_return" method="POST" class="d-flex gap-3 align-items-end">
                    <div><label>Reel No:</label><input type="text" name="reel_no" class="form-control" required></div>
                    <div><label>Return Weight (kg):</label><input type="number" step="0.01" name="returned_weight" class="form-control" required></div>
                    <button type="submit" class="btn btn-warning fw-bold">Process Return</button>
                </form>
            </div>
        </div>
    </div>
</div>

<h3>Currently Issued Stock</h3>
<table class="table table-bordered table-striped mt-2 bg-white shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>SR/GP No</th><th>Reel No</th><th>Type</th><th>Issued Weight</th><th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for stock in stocks %}
        <tr>
            <td>{{ stock.sr_no }} / {{ stock.gate_pass }}</td><td><b>{{ stock.reel_no }}</b></td>
            <td>{{ stock.type }}</td><td>{{ stock.weight }} kg</td>
            <td>
                <form action="/finish_reel/{{ stock.id }}" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-primary">Mark as Finished</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
