<!DOCTYPE html>
<html>
<head>
    <title>Upload Products</title>
</head>
<body>
    <h2>CSV ගොනුවක් මගින් දත්ත ඇතුළත් කරන්න</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv" required>
        <button type="submit">Upload කර Save කරන්න</button>
    </form>
    <br>
    <a href="/dashboard">Dashboard වෙත යන්න</a>
</body>
</html>
