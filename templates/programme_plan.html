<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Programme Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navbar (Base html එකෙහි ඇති පරිදි) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/dashboard">Stock Management</a>
            <a class="nav-link text-white" href="/dashboard">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Programme Plan - Calculation</h4>
            </div>
            <div class="card-body">
                <!-- Data Entry Form -->
                <form id="calcForm">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">PO No</label>
                            <input type="text" id="po_no" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Customer ID</label>
                            <input type="text" id="customer_id" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Product Code</label>
                            <input type="text" id="product_code" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Calculate Reel Size</button>
                </form>

                <hr class="my-4">

                <!-- Display Customer & Product Details -->
                <div id="detailsSection" style="display: none;">
                    <h5>Product Details:</h5>
                    <div class="row mb-3 text-primary fw-bold">
                        <div class="col-md-6"><span id="disp_cust_name"></span></div>
                        <div class="col-md-6"><span id="disp_prod_name"></span></div>
                        <div class="col-md-4">Cartoon Size: <span id="disp_size"></span></div>
                        <div class="col-md-4">Position: <span id="disp_position"></span></div>
                        <div class="col-md-4">Ply: <span id="disp_ply"></span></div>
                    </div>

                    <!-- Display Calculation Options -->
                    <h5 class="mt-4">Best Reel Size Options:</h5>
                    <table class="table table-bordered table-striped text-center mt-2">
                        <thead class="table-dark">
                            <tr>
                                <th>Ups Count</th>
                                <th>Required Size (cm)</th>
                                <th>Suggested Reel Size (cm)</th>
                                <th>Wastage (cm)</th>
                            </tr>
                        </thead>
                        <tbody id="optionsTableBody">
                            <!-- Data will be populated here via JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calcForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const custId = document.getElementById('customer_id').value;
            const prodCode = document.getElementById('product_code').value;

            // API Call (app.py හි ඇති API එක වෙත)
            fetch('/api/get_product_info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    customer_id: custId,
                    product_code: prodCode
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('errorMessage').style.display = 'none';
                    document.getElementById('detailsSection').style.display = 'block';
                    
                    // විස්තර පෙන්වීම
                    document.getElementById('disp_cust_name').innerText = "Customer: " + data.customer_name;
                    document.getElementById('disp_prod_name').innerText = "Product: " + data.product_name;
                    document.getElementById('disp_size').innerText = data.cartoon_size;
                    document.getElementById('disp_position').innerText = data.position;
                    document.getElementById('disp_ply').innerText = data.ply;

                    // Table එකට Options එකතු කිරීම
                    const tbody = document.getElementById('optionsTableBody');
                    tbody.innerHTML = '';
                    data.options.forEach(opt => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${opt.ups}</td>
                                <td>${opt.required_size} cm</td>
                                <td class="fw-bold text-success">${opt.suggested_reel} cm</td>
                                <td class="text-danger">${opt.wastage} cm</td>
                            </tr>
                        `;
                    });
                } else {
                    document.getElementById('detailsSection').style.display = 'none';
                    document.getElementById('errorMessage').style.display = 'block';
                    document.getElementById('errorMessage').innerText = data.message;
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
