<!DOCTYPE html>
<html>
<head>
    <title>VISCOR - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 350px;">
        <h3 class="text-center text-primary mb-4"><b>VISCOR Lanka</b><br><small class="text-muted">Smart Stock System</small></h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login_submit" method="POST">
            <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
            <button type="submit" class="btn btn-primary w-100">Secure Login</button>
        </form>
    </div>
</body>
</html>
