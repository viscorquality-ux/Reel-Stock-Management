{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="height: 80vh;">
    <div class="card p-4 shadow-lg border-0" style="width: 350px;">
        <h3 class="text-center text-primary mb-4"><b>Stock Management</b><br><small class="text-muted fs-6">Smart System Login</small></h3>
        <form action="/login_submit" method="POST">
            <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Enter Role (ex: dataop1)" required></div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Secure Login</button>
        </form>
    </div>
</div>
{% endblock %}
