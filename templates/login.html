<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viscor & Packwell Stock System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .nav-link.active { font-weight: bold; }
        
        /* Print Layout Rules */
        @media print {
            .navbar, .alert, .btn-close, .no-print { display: none !important; }
            body { background-color: white !important; color: black !important; padding-top: 0 !important; }
            .card { border: none !important; box-shadow: none !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .table { width: 100% !important; border-collapse: collapse !important; }
            .table th, .table td { border: 1px solid #ddd !important; }
            .tab-pane { display: block !important; opacity: 1 !important; visibility: visible !important; margin-bottom: 2rem; }
            .nav-tabs { display: none !important; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/"><i class="bi bi-box-seam"></i> Stock Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-3">
    </div>

    <div class="container mt-5">
        <div class="card shadow border-0 mx-auto" style="max-width: 420px;">
            <div class="card-header bg-dark text-white text-center py-4">
                <h4 class="mb-1 fw-bold"><i class="bi bi-shield-lock"></i> System Login</h4>
                <small class="text-muted">Enter your credentials to access</small>
            </div>
            <div class="card-body p-4">
                <form action="/" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold mb-1">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="Type Username..." required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold mb-1">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                            
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div id="liveGreeting" class="text-center mb-3 text-secondary fw-bold" style="display: none;">
                        Hello, <span id="typedUser" class="text-dark"></span>! 👋
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark fw-bold py-2"><i class="bi bi-box-arrow-in-right"></i> Login to System</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ඔබගේ මුල් script එක
        document.getElementById('username').addEventListener('input', function() {
            let currentName = this.value.trim();
            let liveGreeting = document.getElementById('liveGreeting');
            if (currentName.length > 0) {
                document.getElementById('typedUser').innerText = currentName;
                liveGreeting.style.display = 'block';
            } else {
                liveGreeting.style.display = 'none';
            }
        });

        // Password Show/Hide ක්‍රියාත්මක කරන අලුත් script එක
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        togglePassword.addEventListener('click', function () {
            // Text සහ Password අතර type එක මාරු කිරීම
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Icon එක මාරු කිරීම (eye සහ eye-slash අතර)
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
