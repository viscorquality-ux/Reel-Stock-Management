{% extends "base.html" %}
{% block content %}
<div class="card shadow">
    <div class="card-header bg-primary text-white"><h5>Add Active Stock (Raw Material)</h5></div>
    <div class="card-body">
        <form action="/add_stock" method="POST" class="row g-3">
            <div class="col-md-4"><label>Location:</label>
                <select name="store_location" class="form-control">
                    <option>VISCOR Lanka</option><option>Packwel 1</option><option>Packwell 2</option>
                </select>
            </div>
            <div class="col-md-4"><label>Reel Number:</label><input type="text" name="reel_no" class="form-control" required></div>
            <div class="col-md-4"><label>Size:</label><input type="text" name="size" class="form-control" required></div>
            
            <div class="col-md-4"><label>GSM:</label><input type="text" name="gsm" class="form-control" required></div>
            <div class="col-md-4"><label>Type:</label><input type="text" name="type" class="form-control" required></div>
            <div class="col-md-4"><label>Supplier:</label><input type="text" name="supplier" class="form-control" required></div>
            
            <div class="col-md-6"><label>Weight (Kg):</label><input type="number" step="0.01" name="weight" class="form-control" required></div>
            <div class="col-md-6">
                <label>Gate Pass:</label>
                <input type="text" name="gate_pass" class="form-control" {% if session['username'] == 'dataop2' %}value="LOCKED-OP2" readonly{% endif %} required>
            </div>
            
            <div class="col-12 mt-4"><button type="submit" class="btn btn-primary w-100 fw-bold">Save & Add Stock</button></div>
        </form>
    </div>
</div>
{% endblock %}
